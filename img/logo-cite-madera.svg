<svg width="220" height="80" viewBox="0 0 220 80" xmlns="http://www.w3.org/2000/svg">
  <!-- Top-right decorative bars -->
  <line x1="145" y1="10" x2="210" y2="10" stroke="#C4652A" stroke-width="4" stroke-linecap="round"/>
  <line x1="160" y1="18" x2="220" y2="18" stroke="#4A4A4A" stroke-width="3" stroke-linecap="round"/>
  <!-- Bottom-left decorative bars -->
  <line x1="0" y1="62" x2="55" y2="62" stroke="#4A4A4A" stroke-width="3" stroke-linecap="round"/>
  <line x1="10" y1="70" x2="70" y2="70" stroke="#C4652A" stroke-width="4" stroke-linecap="round"/>
  <!-- CITE text (dark gray, bold) -->
  <text x="18" y="42" font-family="Arial Black,Impact,sans-serif" font-size="28" font-weight="900" fill="#3A3A3A" letter-spacing="1">CITE</text>
  <!-- madera text (terracotta orange, bold) -->
  <text x="100" y="42" font-family="Arial Black,Impact,sans-serif" font-size="28" font-weight="900" fill="#C4652A">madera</text>
  <!-- y del mueble (gray, smaller) -->
  <text x="60" y="56" font-family="Arial,Helvetica,sans-serif" font-size="13" font-weight="600" fill="#6A6A6A" letter-spacing="1">y del mueble</text>
</svg>
