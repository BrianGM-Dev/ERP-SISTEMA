  <div id="sidebar-tooltip"></div>
  <script>
  (function(){
    var tip = document.getElementById('sidebar-tooltip');
    if (!tip) return;
    document.getElementById('sidebar').addEventListener('mouseover', function(e){
      var item = e.target.closest('.sidebar-item[data-tooltip]');
      if (!item || !this.classList.contains('sidebar-collapsed')) { tip.classList.remove('visible'); return; }
      var rect = item.getBoundingClientRect();
      tip.textContent = item.getAttribute('data-tooltip');
      tip.style.left = (rect.right + 10) + 'px';
      tip.style.top = (rect.top + rect.height/2) + 'px';
      tip.style.transform = 'translateY(-50%)';
      tip.classList.add('visible');
    });
    document.getElementById('sidebar').addEventListener('mouseleave', function(){ tip.classList.remove('visible'); });
  })();
  </script>
