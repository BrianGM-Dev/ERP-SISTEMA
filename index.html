  <style>
    :root {
      --brand-50:253 243 238; --brand-100:250 227 212; --brand-200:244 196 168;

      --brand-600:168 65 23; --brand-700:138 53 18; --brand-800:110 43 16; --brand-900:82 32 12;
      --accent-50:235 249 245; --accent-100:210 242 232; --accent-200:170 228 210;
      --accent-300:110 200 175; --accent-400:70 175 150; --accent-500:45 139 117;

      --shell-border: #f0ece7;
      --shell-surface: #FAFAF8;
    }

    ::selection { background: rgba(168,65,23,.15); }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { font-family: 'Strawford','Sora','Inter',sans-serif; letter-spacing: -0.01em; overscroll-behavior: none; }
    h1,h2,h3,h4,h5,h6,.font-bold,.font-semibold { letter-spacing: -0.03em; }

    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgb(var(--brand-200)); border-radius: 99px; }
    ::-webkit-scrollbar-thumb:hover { background: rgb(var(--brand-300)); }
    .dark ::-webkit-scrollbar-thumb { background: rgb(var(--night-500)); }
    .dark ::-webkit-scrollbar-thumb:hover { background: rgb(var(--night-400)); }

    #sidebar { transition: transform 0.3s cubic-bezier(0.16,1,0.3,1); }
    .sidebar-item { transition: all 0.15s ease; position: relative; }
    .nav-label { transition: opacity 0.2s ease; }

    .login-bg {
      background: linear-gradient(160deg, rgb(var(--night-900)) 0%, rgb(var(--brand-600)) 50%, rgb(var(--accent-300)) 100%);
    }
    .glass {
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255,255,255,0.12);
    }

    /* Sidebar active item: soft brand background with left border indicator */
    .sidebar-item.active {
      background: rgb(var(--brand-50));
      color: rgb(var(--brand-600)) !important;
      border-left: 3px solid rgb(var(--brand-600));
      box-shadow: none;
      font-weight: 600;
    }
    .sidebar-item.active svg {
      color: rgb(var(--brand-600));
    }
    .dark .sidebar-item.active {
      background: rgb(var(--brand-600) / 0.15);
      color: rgb(var(--brand-300)) !important;
      border-left-color: rgb(var(--brand-400));
    }
    .dark .sidebar-item.active svg {
      color: rgb(var(--brand-300));
    }

    #main-content > div { animation: fadeIn 0.25s ease-out; }
    input:focus, select:focus, textarea:focus { outline: none; }
    canvas { max-width: 100%; }
    .loading-dots::after { content: '.'; animation: dots 1.5s steps(3,end) infinite; }
    @keyframes dots { 0%,20%{content:'.'} 40%{content:'..'} 60%,100%{content:'...'} }
    .sidebar-item:not(.active):hover { transform: translateX(2px); }

    /* Mobile: bottom nav safe area */
    .pb-safe { padding-bottom: calc(70px + var(--safe-bottom)); }

    /* Sidebar overlay on mobile */
    #sidebar-backdrop { transition: opacity 0.3s ease; }
    #sidebar-backdrop.active { opacity: 1; pointer-events: auto; }

    /* Section divider labels in sidebar */
    .sidebar-section-label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #9ca3af;
      padding: 16px 16px 6px 16px;
    }
    .dark .sidebar-section-label { color: rgb(var(--night-400)); }

    /* Dark mode: override warm borders to dark tones */
    .dark #sidebar,
    .dark #sidebar-brand,
    .dark #bottom-nav,
    .dark #profile-wrapper { border-color: rgb(var(--night-700)) !important; }
    .dark .sidebar-section-label { color: rgb(var(--night-400)); }
    .dark header[style] { border-color: rgb(var(--night-700)) !important; }
    .dark #sidebar .p-3[style] { border-color: rgb(var(--night-700)) !important; }

    /* Bottom nav active */
    .bnav-item.active { color: rgb(var(--brand-600)) !important; }
    .bnav-item.active svg { stroke-width: 2.4; }

    /* Sidebar collapsed tooltip (rendered via JS as a fixed div) */
    #sidebar-tooltip {
      position: fixed;
      padding: 6px 12px;
      background: #1f1f1f;
      color: white;
      font-size: 12px;
      font-weight: 500;
      border-radius: 6px;
      white-space: nowrap;
      z-index: 9999;
      pointer-events: none;
      box-shadow: 0 4px 12px rgba(0,0,0,.15);
      opacity: 0;
      transition: opacity .12s ease;
    }
    #sidebar-tooltip.visible { opacity: 1; }
    #sidebar-tooltip::before {
      content: '';
      position: absolute;
      right: 100%;
      top: 50%;
      transform: translateY(-50%);
      border: 5px solid transparent;
      border-right-color: #1f1f1f;
    }

    @media (max-width: 1023px) {
      #sidebar { position: fixed; z-index: 40; transform: translateX(-100%); }
      #sidebar.open { transform: translateX(0); }
    }
  </style>
</head>

  <!-- Sidebar tooltip (fixed position, rendered above everything) -->
  <div id="sidebar-tooltip"></div>
  <script>
  (function(){
    const tip = document.getElementById('sidebar-tooltip');
    if (!tip) return;
    document.getElementById('sidebar').addEventListener('mouseover', function(e){
      const item = e.target.closest('.sidebar-item[data-tooltip]');
      if (!item || !this.classList.contains('sidebar-collapsed')) { tip.classList.remove('visible'); return; }
      const text = item.getAttribute('data-tooltip');
      if (!text) return;
      const rect = item.getBoundingClientRect();
      tip.textContent = text;
      tip.style.left = (rect.right + 10) + 'px';
      tip.style.top = (rect.top + rect.height/2) + 'px';
      tip.style.transform = 'translateY(-50%)';
      tip.classList.add('visible');
    });
    document.getElementById('sidebar').addEventListener('mouseleave', function(){
      tip.classList.remove('visible');
    });
    document.getElementById('sidebar').addEventListener('mouseout', function(e){
      if (!e.target.closest('.sidebar-item[data-tooltip]')) tip.classList.remove('visible');
    });
  })();
  </script>
