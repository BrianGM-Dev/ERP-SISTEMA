<!DOCTYPE html>
<html lang="es" class="">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="theme-color" content="#2A1F17"/>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%23A84117'/><text x='16' y='23' font-size='18' fill='white' text-anchor='middle' font-family='Arial' font-weight='bold'>C</text></svg>"/>
  <title>ERPEmprendedor — CITE MADERA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Sora','Inter','ui-sans-serif','system-ui'],
            mono: ['IBM Plex Mono','ui-monospace','monospace'],
          },
          colors: {
            brand: {
              50:'rgb(var(--brand-50)/<alpha-value>)',100:'rgb(var(--brand-100)/<alpha-value>)',
              200:'rgb(var(--brand-200)/<alpha-value>)',300:'rgb(var(--brand-300)/<alpha-value>)',
              400:'rgb(var(--brand-400)/<alpha-value>)',500:'rgb(var(--brand-500)/<alpha-value>)',
              600:'rgb(var(--brand-600)/<alpha-value>)',700:'rgb(var(--brand-700)/<alpha-value>)',
              800:'rgb(var(--brand-800)/<alpha-value>)',900:'rgb(var(--brand-900)/<alpha-value>)',
            },
            accent: {
              50:'rgb(var(--accent-50)/<alpha-value>)',100:'rgb(var(--accent-100)/<alpha-value>)',
              200:'rgb(var(--accent-200)/<alpha-value>)',300:'rgb(var(--accent-300)/<alpha-value>)',
              400:'rgb(var(--accent-400)/<alpha-value>)',500:'rgb(var(--accent-500)/<alpha-value>)',
              600:'rgb(var(--accent-600)/<alpha-value>)',700:'rgb(var(--accent-700)/<alpha-value>)',
            },
            gold:{300:'#ffe580',400:'#ffdc39',500:'#f0c800'},
            night: {
              50:'rgb(var(--night-50)/<alpha-value>)',100:'rgb(var(--night-100)/<alpha-value>)',
              200:'rgb(var(--night-200)/<alpha-value>)',300:'rgb(var(--night-300)/<alpha-value>)',
              400:'rgb(var(--night-400)/<alpha-value>)',500:'rgb(var(--night-500)/<alpha-value>)',
              600:'rgb(var(--night-600)/<alpha-value>)',700:'rgb(var(--night-700)/<alpha-value>)',
              800:'rgb(var(--night-800)/<alpha-value>)',900:'rgb(var(--night-900)/<alpha-value>)',
              950:'rgb(var(--night-950)/<alpha-value>)',
            },
          },
          animation: {
            'fade-in':'fadeIn .3s ease-out',
            'slide-up':'slideUp .4s cubic-bezier(.16,1,.3,1)',
            'shake':'shake .4s ease-in-out',
            'slide-in':'slideIn .3s cubic-bezier(.16,1,.3,1)',
          },
          keyframes: {
            fadeIn:{'0%':{opacity:'0'},'100%':{opacity:'1'}},
            slideUp:{'0%':{opacity:'0',transform:'translateY(20px)'},'100%':{opacity:'1',transform:'translateY(0)'}},
            shake:{'0%,100%':{transform:'translateX(0)'},'20%,60%':{transform:'translateX(-8px)'},'40%,80%':{transform:'translateX(8px)'}},
            slideIn:{'0%':{transform:'translateX(-100%)'},'100%':{transform:'translateX(0)'}},
          },
        },
      },
    };
  </script>
  <style>
    :root{
      --brand-50:253 243 238;--brand-100:250 227 212;--brand-200:244 196 168;
      --brand-300:236 160 115;--brand-400:217 122 62;--brand-500:192 96 30;
      --brand-600:168 65 23;--brand-700:138 53 18;--brand-800:110 43 16;--brand-900:82 32 12;
      --accent-50:240 247 242;--accent-100:220 238 225;--accent-200:185 218 193;
      --accent-300:140 190 152;--accent-400:107 143 113;--accent-500:80 120 88;
      --accent-600:60 98 70;--accent-700:45 78 55;
      --night-50:248 245 242;--night-100:238 230 222;--night-200:218 206 192;
      --night-300:185 168 150;--night-400:148 130 112;--night-500:112 96 78;
      --night-600:82 68 54;--night-700:58 46 36;--night-800:42 32 24;
      --night-900:30 22 16;--night-950:20 14 10;
      --safe-bottom:env(safe-area-inset-bottom,0px);
      --sb:#1E1610;--sb-hover:rgba(255,255,255,.06);--sb-active:rgba(168,65,23,.15);
      --sb-text:#8C7B6A;--sb-text-hover:#D4C4B0;--sb-border:rgba(196,168,130,.08);
      --surface:#F6F3EF;--glass:rgba(246,243,239,.82);
      --border:#E8DFD4;--border-brand:rgba(168,65,23,.15);
    }
    ::selection{background:rgba(168,65,23,.18)}
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{font-family:'Sora','Inter',sans-serif;letter-spacing:-.01em;overscroll-behavior:none;
      -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;margin:0}
    h1,h2,h3,h4,h5,h6,.font-bold,.font-semibold{letter-spacing:-.03em}

    /* Scrollbar */
    ::-webkit-scrollbar{width:5px;height:5px}
    ::-webkit-scrollbar-track{background:transparent}
    ::-webkit-scrollbar-thumb{background:#D4C4B0;border-radius:99px}
    ::-webkit-scrollbar-thumb:hover{background:rgb(var(--brand-400))}

    /* ===================== SIDEBAR ===================== */
    #sidebar{
      background:var(--sb);
      width:240px;transition:width .28s cubic-bezier(.16,1,.3,1);
      border-right:1px solid var(--sb-border);
    }
    .sidebar-collapsed #sidebar{width:68px}

    /* Nav items */
    .si{
      display:flex;align-items:center;gap:12px;
      padding:10px 14px;border-radius:12px;
      color:var(--sb-text);font-size:13px;font-weight:500;
      transition:all .15s ease;cursor:pointer;border:none;width:100%;
      background:none;text-align:left;position:relative;
      white-space:nowrap;overflow:hidden;
    }
    .si:hover{color:var(--sb-text-hover);background:var(--sb-hover)}
    .si.active{color:#F4C4A8;background:var(--sb-active)}
    .si.active::after{
      content:'';position:absolute;right:0;top:10px;bottom:10px;
      width:3px;border-radius:3px 0 0 3px;background:rgb(var(--brand-400));
    }
    .si svg{width:20px;height:20px;flex-shrink:0}
    .si .si-label{overflow:hidden;transition:opacity .2s ease,width .25s cubic-bezier(.16,1,.3,1)}
    .sidebar-collapsed .si .si-label{opacity:0;width:0}
    .sidebar-collapsed .si{justify-content:center;padding:10px 0}

    /* Section labels */
    .sl{
      font-family:'IBM Plex Mono',monospace;font-size:9px;font-weight:600;
      text-transform:uppercase;letter-spacing:.14em;color:rgba(140,123,106,.35);
      padding:20px 16px 6px;overflow:hidden;
      transition:opacity .2s,max-height .25s,padding .25s;
    }
    .sidebar-collapsed .sl{opacity:0;max-height:0;padding:0 16px}

    /* Sidebar brand */
    .sb-full{transition:opacity .2s,width .28s cubic-bezier(.16,1,.3,1),margin .28s;overflow:hidden}
    .sidebar-collapsed .sb-full{opacity:0;width:0;margin-left:0}

    /* Sidebar footer */
    .sf{overflow:hidden;transition:opacity .25s,max-height .3s}
    .sidebar-collapsed .sf{opacity:0;max-height:0}

    /* ===================== TOPBAR ===================== */
    .topbar{
      height:60px;
      background:var(--glass);
      backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
      border-bottom:1px solid var(--border);
    }
    .dark .topbar{background:rgba(30,22,16,.88);border-color:rgba(255,255,255,.06)}

    /* ===================== MAIN ===================== */
    #main-content>div{animation:fadeIn .3s ease-out}
    input:focus,select:focus,textarea:focus{outline:none}
    canvas{max-width:100%}
    .loading-dots::after{content:'.';animation:dots 1.5s steps(3,end) infinite}
    @keyframes dots{0%,20%{content:'.'}40%{content:'..'}60%,100%{content:'...'}}

    /* Mobile */
    .pb-safe{padding-bottom:calc(70px + var(--safe-bottom))}
    #sidebar-backdrop{transition:opacity .3s ease}
    #sidebar-backdrop.active{opacity:1;pointer-events:auto}
    .bnav-item.active{color:rgb(var(--brand-500))!important}
    .bnav-item.active svg{stroke-width:2.2}
    @media(max-width:1023px){
      #sidebar{position:fixed;z-index:40;transform:translateX(-100%);width:260px!important}
      #sidebar.open{transform:translateX(0)}
      .sidebar-collapsed #sidebar{width:260px!important}
      .sidebar-collapsed .si .si-label{opacity:1;width:auto}
      .sidebar-collapsed .si{justify-content:flex-start;padding:10px 14px}
      .sidebar-collapsed .sl{opacity:1;max-height:40px;padding:20px 16px 6px}
      .sidebar-collapsed .sb-full{opacity:1;width:auto;margin-left:12px}
      .sidebar-collapsed .sf{opacity:1;max-height:200px}
    }

    /* Tooltip */
    .sidebar-collapsed .si:hover .si-tip{display:block}
    .si-tip{
      display:none;position:absolute;left:calc(100% + 14px);top:50%;transform:translateY(-50%);
      background:var(--sb);color:#F4F1ED;font-size:12px;font-weight:500;
      padding:6px 12px;border-radius:10px;white-space:nowrap;z-index:9999;
      box-shadow:0 8px 20px rgba(30,22,16,.25);border:1px solid rgba(196,168,130,.12);
      pointer-events:none;
    }
    .si-tip::before{
      content:'';position:absolute;right:100%;top:50%;transform:translateY(-50%);
      border:5px solid transparent;border-right-color:var(--sb);
    }
    @media(max-width:1023px){.si-tip{display:none!important}}

    /* UX: Focus visible */
    button:focus-visible,a:focus-visible{outline:2px solid rgb(var(--brand-400));outline-offset:2px;border-radius:8px}

    /* ===================== UTILITIES ===================== */
    .mono-label{
      font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:600;
      text-transform:uppercase;letter-spacing:.12em;
    }
  </style>
</head>

<!-- Override App.toggleSidebar for index2 layout -->
<script>
(function(){
  const shell = document.getElementById('app-shell');

  App.toggleSidebar = function() {
    const isMobile = window.innerWidth < 1024;
    const sidebar = document.getElementById('sidebar');
    const backdrop = document.getElementById('sidebar-backdrop');

    if (isMobile) {
      const isOpen = sidebar.classList.contains('open');
      if (isOpen) {
        App.closeSidebar();
      } else {
        sidebar.classList.add('open');
        backdrop.classList.add('active');
      }
    } else {
      shell.classList.toggle('sidebar-collapsed');
      App.state.sidebarCollapsed = shell.classList.contains('sidebar-collapsed');
    }
  };

  App.closeSidebar = function() {
    const sidebar = document.getElementById('sidebar');
    const backdrop = document.getElementById('sidebar-backdrop');
    sidebar.classList.remove('open');
    backdrop.classList.remove('active');
  };

  // Register designsystem module
  App.modules.designsystem = () => DesignSystem.render();
  App.moduleNames = App.moduleNames || {};
  App.moduleNames.designsystem = 'Design System';
  // Allow access for all roles
  Object.keys(App.moduleAccess).forEach(rol => {
    if (!App.moduleAccess[rol].includes('designsystem')) App.moduleAccess[rol].push('designsystem');
  });

  // Override navigate to update .si active states + breadcrumb
  const origNavigate = App.navigate.bind(App);
  App.navigate = function(mod) {
    origNavigate(mod);
    // Update sidebar active
    document.querySelectorAll('.si').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.module === mod);
    });
    // Update breadcrumb
    const bc = document.getElementById('breadcrumb');
    if (bc) {
      const name = {dashboard:'Dashboard',inventario:'Inventario',compras:'Compras',ventas:'Ventas',produccion:'Produccion',costos:'Costos',finanzas:'Finanzas',rrhh:'RRHH',admin:'Administracion'}[mod] || mod;
      const span = bc.querySelector('.text-night-900, .dark\\:text-night-100');
      if (span) span.textContent = name;
    }
    // Update bottom nav
    document.querySelectorAll('.bnav-item').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.bnav === mod);
    });
    // Close mobile sidebar
    if (window.innerWidth < 1024) App.closeSidebar();
  };
})();
</script>
